name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Fetch Discord data
        run: node scripts/fetch-discord.js

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./out"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Ping IndexNow
        if: success()
        run: |
          curl -s -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json" \
            -d '{
              "host": "ghost0development.github.io",
              "key": "a2ec0f73674a203f81e56072a90381e8",
              "keyLocation": "https://ghost0development.github.io/gostdevelopmentszczecin/a2ec0f73674a203f81e56072a90381e8.txt",
              "urlList": [
                "https://ghost0development.github.io/gostdevelopmentszczecin/",
                "https://ghost0development.github.io/gostdevelopmentszczecin/cennik",
                "https://ghost0development.github.io/gostdevelopmentszczecin/kontakt",
                "https://ghost0development.github.io/gostdevelopmentszczecin/portfolio",
                "https://ghost0development.github.io/gostdevelopmentszczecin/rezerwacja"
              ]
            }' && echo "IndexNow: notified" || echo "IndexNow: failed (non-critical)"
